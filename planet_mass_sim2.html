<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>克卜勒運動物理模擬 - 雙星與質心系統</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: #ffffff; 
            color: #333333; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .container { 
            background: #fdfdfd; 
            padding: 25px; 
            border-radius: 12px; 
            width: 100%; 
            max-width: 900px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #eaeaea;
        }
        h1 { color: #2c3e50; text-align: center; margin-top: 0; font-size: 1.8em; }
        .subtitle { text-align: center; color: #7f8c8d; margin-bottom: 20px; font-size: 0.9em; }
        
        .formulas { 
            background: #f8f9fa; 
            padding: 15px 20px; 
            border-radius: 8px; 
            margin-bottom: 25px; 
            font-family: 'Courier New', Courier, monospace; 
            border-left: 5px solid #e74c3c; 
            line-height: 1.8; 
            font-size: 0.95em; 
            color: #2c3e50;
        }
        
        .controls { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            margin-bottom: 25px; 
        }
        .control-group { 
            display: flex; 
            flex-direction: column; 
            background: #ffffff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #e0e0e0;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .input-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        label { font-weight: bold; color: #555; font-size: 0.9em; }
        
        input[type=number] { 
            width: 90px; 
            padding: 5px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            font-family: monospace;
            text-align: right;
        }
        input[type=range] { 
            width: 100%; 
            cursor: pointer;
        }
        
        canvas { 
            background: #f4f6f8; 
            border-radius: 8px; 
            width: 100%; 
            height: 400px; 
            border: 1px solid #dce1e6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>克卜勒運動：二體問題與質心互繞</h1>
        <div class="subtitle">考慮兩天體質量互相影響，共同繞行系統質心 (Barycenter)</div>
        
        <div class="formulas" id="formulaDisplay"></div>
        
        <div class="controls">
            <!-- 質量 M -->
            <div class="control-group">
                <div class="input-row">
                    <label>M 中心星質量 (10²⁷ kg)</label>
                    <input type="number" id="numM" value="1.898" step="0.001" min="0.1" max="10">
                </div>
                <input type="range" id="rangeM" min="0.1" max="10" step="0.001" value="1.898">
            </div>
            
            <!-- 質量 m -->
            <div class="control-group">
                <div class="input-row">
                    <label>m 伴星/衛星質量 (10²⁷ kg)</label>
                    <!-- 木衛四真實質量約為 0.0001 x 10^27 kg，開放最大至 10 以模擬雙星 -->
                    <input type="number" id="numm" value="0.0001" step="0.0001" min="0.0001" max="10">
                </div>
                <input type="range" id="rangem" min="0.0001" max="10" step="0.0001" value="0.0001">
            </div>
            
            <!-- 半徑 a -->
            <div class="control-group">
                <div class="input-row">
                    <label>a 兩星總距離 (10⁹ m)</label>
                    <input type="number" id="numa" value="1.882" step="0.001" min="0.5" max="5">
                </div>
                <input type="range" id="rangea" min="0.5" max="5" step="0.001" value="1.882">
            </div>
            
            <!-- 週期 T -->
            <div class="control-group">
                <div class="input-row">
                    <label>T 公轉週期 (地球日)</label>
                    <input type="number" id="numT" value="16.689" step="0.001" min="1" max="100">
                </div>
                <input type="range" id="rangeT" min="1" max="100" step="0.001" value="16.689">
            </div>
        </div>
        
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const G = 6.6743e-11; 
        
        // 單位轉換常數
        const scaleM = 1e27;
        const scaleA = 1e9;
        const scaleT = 86400; // 1天 = 86400秒
        
        let angle = 0;

        // 同步 UI 顯示
        function syncUI(id, val) {
            // m 的小數位數顯示多一點，其餘顯示 3 位
            let decimals = id === 'm' ? 4 : 3;
            document.getElementById('num' + id).value = Number(val).toFixed(decimals);
            document.getElementById('range' + id).value = val;
        }

        // 綁定事件：質量 M 改變 -> 更新 T
        function handleM(e) {
            let val = parseFloat(e.target.value);
            syncUI('M', val);
            recalculateT();
        }

        // 綁定事件：質量 m 改變 -> 更新 T (雙星系統中，m改變也會影響整體週期)
        function handlem(e) {
            let val = parseFloat(e.target.value);
            syncUI('m', val);
            recalculateT();
        }

        // 綁定事件：半徑 a 改變 -> 更新 T
        function handleA(e) {
            let val = parseFloat(e.target.value);
            syncUI('a', val);
            recalculateT();
        }

        // 綁定事件：週期 T 改變 -> 更新 a
        function handleT(e) {
            let val = parseFloat(e.target.value);
            syncUI('T', val);
            
            let T_s = val * scaleT;
            let M_kg = parseFloat(document.getElementById('numM').value) * scaleM;
            let m_kg = parseFloat(document.getElementById('numm').value) * scaleM;
            
            // a = cbrt( G(M+m)T² / 4π² )
            let a_m = Math.cbrt((G * (M_kg + m_kg) * Math.pow(T_s, 2)) / (4 * Math.PI**2));
            syncUI('a', a_m / scaleA);
        }

        // 重新計算 T 的共用函數
        function recalculateT() {
            let M_kg = parseFloat(document.getElementById('numM').value) * scaleM;
            let m_kg = parseFloat(document.getElementById('numm').value) * scaleM;
            let a_m = parseFloat(document.getElementById('numa').value) * scaleA;
            
            // T = sqrt( 4π²a³ / G(M+m) )
            let T_s = Math.sqrt((4 * Math.PI**2 * Math.pow(a_m, 3)) / (G * (M_kg + m_kg)));
            syncUI('T', T_s / scaleT);
        }

        ['num', 'range'].forEach(prefix => {
            document.getElementById(prefix + 'M').addEventListener('input', handleM);
            document.getElementById(prefix + 'm').addEventListener('input', handlem);
            document.getElementById(prefix + 'a').addEventListener('input', handleA);
            document.getElementById(prefix + 'T').addEventListener('input', handleT);
        });

        function fmtExp(num) {
            return num.toExponential(2).replace('e+', ' × 10^').replace('e-', ' × 10^-');
        }

        function updatePhysics() {
            const M = parseFloat(document.getElementById('numM').value) * scaleM;
            const m = parseFloat(document.getElementById('numm').value) * scaleM;
            const a = parseFloat(document.getElementById('numa').value) * scaleA;
            const T = parseFloat(document.getElementById('numT').value) * scaleT;

            // 雙星系統幾何與物理計算
            const Fg = (G * M * m) / (a * a);
            
            // 伴星 m 到質心的距離 rm
            const r_m = a * (M / (M + m));
            // 主星 M 到質心的距離 rM
            const r_M = a * (m / (M + m));
            
            // 伴星速度
            const v_m = (2 * Math.PI * r_m) / T;
            const Fc = (m * v_m * v_m) / r_m;
            
            document.getElementById('formulaDisplay').innerHTML = `
                Fg (萬有引力) = ( G · M · m ) / a² <br>
                &nbsp;&nbsp;= 6.67 × 10⁻¹¹ × (${fmtExp(M)}) × (${fmtExp(m)}) / (${fmtExp(a)})² <br>
                &nbsp;&nbsp;≈ <strong>${fmtExp(Fg)} N</strong><br><br>
                
                Fc (伴星向心力) = ( m · v² ) / r_m <span style="color:#95a5a6;font-size:0.9em;">(r_m為伴星到質心距離)</span><br>
                &nbsp;&nbsp;= (${fmtExp(m)}) × (${fmtExp(v_m)})² / (${fmtExp(r_m)}) <br>
                &nbsp;&nbsp;≈ <strong>${fmtExp(Fc)} N</strong><br><br>
                
                M + m = ( 4π²a³ ) / ( G · T² ) <span style="color:#95a5a6;font-size:0.9em;">(雙星系統總質量)</span><br>
                &nbsp;&nbsp;= 4π² × (${fmtExp(a)})³ / [ 6.67 × 10⁻¹¹ × (${fmtExp(T)})² ] <br>
                &nbsp;&nbsp;≈ <strong>${fmtExp(M + m)} kg</strong>
            `;
            
            return {M, m, a, T, r_m, r_M};
        }

        function draw() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            const params = updatePhysics();
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 依據畫布大小計算視覺比例
            const visualA = (params.a / scaleA) * 65; 
            const visual_r_m = visualA * (params.M / (params.M + params.m)); // 伴星軌道半徑
            const visual_r_M = visualA * (params.m / (params.M + params.m)); // 主星軌道半徑
            
            // 1. 繪製質心 (Barycenter) - 紅色十字
            ctx.strokeStyle = 'rgba(231, 76, 60, 0.8)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(centerX - 8, centerY); ctx.lineTo(centerX + 8, centerY);
            ctx.moveTo(centerX, centerY - 8); ctx.lineTo(centerX, centerY + 8);
            ctx.stroke();

            // 2. 繪製主星軌道
            ctx.strokeStyle = 'rgba(211, 156, 126, 0.5)'; 
            ctx.lineWidth = 1;
            ctx.setLineDash([4, 4]); 
            ctx.beginPath(); 
            ctx.arc(centerX, centerY, visual_r_M, 0, Math.PI * 2); 
            ctx.stroke();

            // 3. 繪製伴星軌道
            ctx.strokeStyle = 'rgba(127, 140, 141, 0.5)';
            ctx.beginPath(); 
            ctx.arc(centerX, centerY, visual_r_m, 0, Math.PI * 2); 
            ctx.stroke();
            ctx.setLineDash([]);
            
            // 動畫角度更新
            const T_days = params.T / scaleT;
            angle += (2 * Math.PI) / (T_days * 15); 
            
            // 天體位置 (兩星相差 180 度 / PI)
            const Mx = centerX + visual_r_M * Math.cos(angle + Math.PI);
            const My = centerY + visual_r_M * Math.sin(angle + Math.PI);
            const mx = centerX + visual_r_m * Math.cos(angle);
            const my = centerY + visual_r_m * Math.sin(angle);
            
            // 4. 畫出兩星相連的引力線 (距離 a)
            ctx.strokeStyle = 'rgba(189, 195, 199, 0.3)';
            ctx.beginPath(); ctx.moveTo(Mx, My); ctx.lineTo(mx, my); ctx.stroke();

            // 5. 繪製主星 M
            const visualMSize = Math.max(6, Math.cbrt(params.M / scaleM) * 14);
            ctx.fillStyle = '#d39c7e';
            ctx.beginPath(); ctx.arc(Mx, My, visualMSize, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = '#b07f63'; ctx.lineWidth = 2; ctx.stroke();
            
            // 6. 繪製伴星 m
            const visualmSize = Math.max(4, Math.cbrt(params.m / scaleM) * 14);
            ctx.fillStyle = '#7f8c8d';
            ctx.beginPath(); ctx.arc(mx, my, visualmSize, 0, Math.PI * 2); ctx.fill();
            
            requestAnimationFrame(draw);
        }
        
        draw();
    </script>
</body>
</html>
